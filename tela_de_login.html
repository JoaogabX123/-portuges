 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <title>Tela de Login</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-image: linear-gradient(30deg, cyan, rgb(35, 115, 235));
        }
        div{
            background-color: rgba(0, 0, 0, 0.8);
            position: absolute;
            top: 50%;
            left:50%;
            transform: translate(-50%,-50%);
            padding: 75px;
            border-radius: 15px;
            color: aliceblue;
        }
        h1{
            text-align: center;
        }
        input{
            padding: 15px;
            border: none;
            outline: none;
            font-size: 15px;
        }
        button{
            background-color: rgb(82, 202, 250);
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 5px;
        }
        button:hover{
            background-color: rgb(60, 141, 248);
            cursor: pointer;
        }
    </style>
 </head>
 <body>
    <div>
        <h1>Login</h1>
        <input type="text" placeholder="E-mail">
        <br><br>
        <input type="password" placeholder="Senha">
        <br><br>
        <button>Enviar</button>
    </div>
 </body>
 </html>
