<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>+Português</title>

<style>
    body{
        font-family: Arial, Helvetica, sans-serif;
        background-image: linear-gradient(30deg, cyan, rgb(35, 115, 235));
        margin: 25px;
        margin-top: 25px;
    }

    header{
        background-color: rgba(0, 0, 0, 0.8);
        color: rgb(239, 249, 255);
        padding: 20px;
        text-align: center;      
    }

    header input{
        margin-top: 10px; 
        outline: none;        
        padding: 10px;
        width: 300px;
    }

    main{
        width: 1000px;
        margin: auto;
        margin-top: 40px;
    }

    .questao_aberta{
        background: rgb(250,253,255);
        padding: 25px;
        border-radius: 8px;
    }

    .topo_questao{
        display: flex;
        justify-content: space-between;
        margin-bottom: 10px;
    }

    .titulo{
        font-size: 20px;
        font-weight: bold;
    }

    .genero{
        background: #3182ce;
        color: white;
        border: none;
        padding: 5px 10px;
        border-radius: 5px;
    }

    .subgenero{
        margin-top: 5px;
        margin-bottom: 20px;
        color: rgb(90,90,90);
    }

    .enunciado{
        background: rgb(240,245,250);
        padding: 15px;
        border-radius: 6px;
        margin-bottom: 20px;
    }


    .resposta{
        margin-bottom: 20px;
    }

    .resposta textarea{
        width: 100%;
        height: 150px;
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #ccc;
        resize: none;
    }

    .explicacao{
        background: rgb(235,245,255);
        padding: 15px;
        border-radius: 6px;
        margin-bottom: 20px;
    }

    .botoes{
        display: flex;
        gap: 10px;
    }

    .botoes button{
        border: none;
        padding: 10px 15px;
        border-radius: 6px;
        cursor: pointer;
    }

    .voltar{
        background: rgb(60,60,60);
        color: white;
    }

    .copiar{
        background: #3182ce;
        color: white;
    }

    .baixar{
        background: rgb(60,141,248);
        color: white;
    }


    .add{
        position: fixed;
        bottom: 50px;
        left: 50%;
        transform: translateX(-50%);
        background-color: rgb(60, 141, 248);
        color: white;
        border: none;
        padding: 20px 30px;
        font-size: 25px;
        border-radius: 10px;
        cursor: pointer;
    }

</style>
</head>

<body>

<header>
    <h1>+Português</h1>
    <input type="text" placeholder="Pesquisar questão...">
</header>

<main>

    <div class="questao_aberta">

        <div class="topo_questao">

            <div class="titulo">
                Título da questão dissertativa
            </div>

            <button class="genero">
                Gênero
            </button>

        </div>

        <div class="subgenero">
            Especificação / Subgênero
        </div>

        <div class="enunciado">
            Explique o significado do texto apresentado e sua importância para o gênero textual estudado.
        </div>

        <div class="resposta">
            <textarea placeholder="Digite sua resposta aqui..."></textarea>
        </div>

        <div class="explicacao">
            <b>Explicação:</b><br><br>
            Aqui fica a explicação da resposta esperada da questão.
        </div>

        <div class="botoes">

            <button class="voltar">
                Voltar
            </button>

            <button class="copiar">
                Copiar
            </button>

            <button class="baixar">
                Baixar
            </button>

        </div>

    </div>

</main>

<button class="add">
    + Adicionar questão
</button>

</body>
</html>
