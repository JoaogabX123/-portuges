<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>+Português</title>
<style>
    body { font-family: Arial, Helvetica, sans-serif; background-image: linear-gradient(30deg, cyan, rgb(35,115,235)); margin: 25px; }
    header { background-color: rgba(0,0,0,0.8); color: rgb(239,249,255); padding: 20px; text-align: center; }
    header input { margin-top: 10px; outline: none; padding: 10px; width: 300px; }
    main { width: 1000px; margin: auto; margin-top: 40px; }
    .questao_aberta { background: rgb(250,253,255); padding: 25px; border-radius: 8px; }
    .topo_questao { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .titulo { font-size: 20px; font-weight: bold; }
    .genero { background: #3182ce; color: white; border: none; padding: 5px 10px; border-radius: 5px; }
    .subgenero { margin-top: 5px; margin-bottom: 20px; color: rgb(90,90,90); }
    .enunciado { background: rgb(240,245,250); padding: 15px; border-radius: 6px; margin-bottom: 20px; }
    .enunciado img { max-width: 100%; border-radius: 6px; margin-bottom: 10px; display: block; }
    .alternativas { margin-bottom: 20px; }
    .alternativa { border: 1px solid #ddd; padding: 10px; border-radius: 6px; margin-bottom: 10px; cursor: pointer; transition: background 0.15s; }
    .alternativa:hover { background: rgb(240,240,240); }
    .alternativa.selecionada { background: #ebf4ff; border-color: #3182ce; }
    .explicacao { background: rgb(235,245,255); padding: 15px; border-radius: 6px; margin-bottom: 20px; }
    .botoes { display: flex; gap: 10px; }
    .botoes button { border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; }
    .voltar { background: rgb(60,60,60); color: white; }
    .editar { background: #3182ce; color: white; }
    .copiar { background: #3182ce; color: white; }
    .baixar { background: rgb(60,141,248); color: white; }
    .add { position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%); background-color: rgb(60,141,248); color: white; border: none; padding: 20px 30px; font-size: 25px; border-radius: 10px; cursor: pointer; }
</style>
</head>
<body>

<header>
    <h1>+Português</h1>
    <input type="text" placeholder="Pesquisar questão...">
</header>

<main>
    <div class="questao_aberta" id="conteudo">
        <p style="text-align:center;color:#888;">Carregando...</p>
    </div>
</main>

<button class="add" onclick="window.location='home_page.html'">+ Adicionar questão</button>

<script>
    const BASE = '../beckend';
    const id   = new URLSearchParams(window.location.search).get('id');

    window.addEventListener('DOMContentLoaded', async () => {
        if (!id) { window.location.href = 'home_page.html'; return; }

        const res = await fetch(`${BASE}/buscar_questao.php?id=${encodeURIComponent(id)}`);
        if (!res.ok) { window.location.href = 'home_page.html'; return; }

        const q = await res.json();
        if (q.tipo !== 'objetiva') { window.location.href = `aba_questao_dissertativa.html?id=${id}`; return; }

        const sub = [q.especificacao, q.subgenero].filter(Boolean).join(' / ');
        const imgTag = q.imagem
            ? `<img src="../beckend/${q.imagem}" alt="Imagem da questão">`
            : '';

        const alternativas = Object.entries(q.alternativas || {})
            .filter(([, v]) => v)
            .map(([k, v]) => `<div class="alternativa" onclick="selecionar(this)">${k}) ${v}</div>`)
            .join('');

        document.getElementById('conteudo').innerHTML = `
            <div class="topo_questao">
                <div class="titulo">${q.titulo || '(sem título)'}</div>
                <button class="genero">${q.genero || '-'}</button>
            </div>
            <div class="subgenero">${sub}</div>
            <div class="enunciado">${imgTag}${q.enunciado || ''}</div>
            <div class="alternativas">${alternativas}</div>
            <div class="explicacao"><b>Explicação:</b><br><br>${q.explicacao || ''}</div>
            <div class="botoes">
                <button class="voltar" onclick="window.location='home_page.html'">Voltar</button>
                <button class="editar" onclick="window.location='editar_questao.html?id=${encodeURIComponent(q.id)}'">Editar</button>
                <button class="copiar" onclick="copiar()">Copiar</button>
                <button class="baixar">Baixar</button>
            </div>
        `;
    });

    function selecionar(el) {
        document.querySelectorAll('.alternativa').forEach(a => a.classList.remove('selecionada'));
        el.classList.add('selecionada');
    }

    function copiar() {
        navigator.clipboard.writeText(document.getElementById('conteudo').innerText)
            .then(() => alert('Questão copiada!'));
    }
</script>
</body>
</html>
